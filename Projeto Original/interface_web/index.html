<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Puxador de Certidões</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F17; --panel:#121826; --panelAlt:#182233; --border:#232C3D;
    --text:#E7ECF3; --subtext:#8996AA; --inputBg:#0E1420; --accent:#3B82F6;
    --pend:#8996AA; --baix:#2F80ED; --ok:#22C55E; --erro:#EF4444; --manual:#C8952E;
  }
  :root[data-theme="light"]{
    --bg:#F3F5F9; --panel:#FFFFFF; --panelAlt:#EDF1F7; --border:#DCE2EA;
    --text:#1A2233; --subtext:#66728A; --inputBg:#FFFFFF;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg); color:var(--text); font-size:13.5px; overflow:hidden;
  }
  .app{display:flex; height:100vh}
  .rail svg,.stat .ic svg,.btn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:none}
  .logo svg{width:19px;height:19px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  /* ---------- barra lateral ---------- */
  .rail{width:68px; background:var(--panelAlt); border-right:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; padding:14px 0; gap:8px}
  .logo{width:34px;height:34px;border-radius:10px;background:var(--accent);
    display:flex;align-items:center;justify-content:center;color:#fff;margin-bottom:8px}
  .rail button{width:38px;height:38px;border-radius:10px;border:none;background:transparent;
    color:var(--subtext);cursor:pointer;display:flex;align-items:center;justify-content:center}
  .rail button:hover{background:rgba(140,150,170,.12);color:var(--text)}
  .rail button.ativo{background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent)}
  .rail .sep{flex:1}
  /* ---------- área principal ---------- */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .content{flex:1;overflow-y:auto;padding:28px 34px}
  h1{font-family:'Manrope',sans-serif;font-weight:800;font-size:22px}
  .sub{color:var(--subtext);font-size:14px;margin-top:2px;margin-bottom:20px}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px}
  .stat{display:flex;align-items:center;gap:12px}
  .stat .ic{width:42px;height:42px;border-radius:11px;
    background:color-mix(in srgb,var(--accent) 10%,transparent);color:var(--accent);
    display:flex;align-items:center;justify-content:center}
  .stat .num{font-family:'Manrope';font-weight:800;font-size:22px;line-height:1}
  .stat .lbl{color:var(--subtext);font-size:11.5px;margin-top:3px}
  .grid2{display:grid;grid-template-columns:1fr 1.15fr;gap:20px}
  .card h2{font-size:14px;font-weight:700;margin-bottom:2px}
  .card .h-sub{color:var(--subtext);font-size:12px;margin-bottom:12px}
  textarea{width:100%;height:120px;resize:none;background:var(--inputBg);
    border:1px solid var(--border);border-radius:10px;color:var(--text);
    font-family:'JetBrains Mono',monospace;font-size:12.5px;padding:12px;line-height:1.6}
  textarea::placeholder{color:var(--subtext)}
  .btn{border:none;border-radius:10px;padding:11px 14px;font-size:13.5px;font-weight:600;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
  .btn-primary{background:var(--accent);color:#fff;margin-top:12px}
  .btn-primary:disabled{opacity:.5;cursor:default}
  .btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);margin-top:8px}
  .btn-outline:disabled{opacity:.4;cursor:default}
  /* ---------- lista de certidões ---------- */
  .cert-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .todas{display:flex;align-items:center;gap:7px;color:var(--subtext);font-size:12.5px;cursor:pointer}
  .tagfilter{display:flex;align-items:center;gap:6px}
  .tf-lbl{color:var(--subtext);font-size:12px;margin-right:2px}
  .tchip{font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px;cursor:pointer;
         border:1px solid var(--border);background:transparent;color:var(--subtext);transition:.12s}
  .tchip:hover{border-color:var(--text);color:var(--text)}
  .tchip[data-tag="CNPJ"].on{background:rgba(99,140,255,.20);border-color:#6f8cff;color:#bcccff;box-shadow:0 0 0 1px rgba(99,140,255,.30)}
  .tchip[data-tag="CPF"].on{background:rgba(167,139,250,.22);border-color:#a78bfa;color:#d8c8ff;box-shadow:0 0 0 1px rgba(167,139,250,.30)}
  .linha .tags{display:flex;gap:4px;flex:none}
  .tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;transition:.12s}
  .tag.t-CNPJ{color:#93a9dd;background:rgba(99,140,255,.14)}
  .tag.t-CPF{color:#bda9e8;background:rgba(167,139,250,.16)}
  .tag.t-CNPJ.acesa{color:#0a1330;background:#7d9bff}
  .tag.t-CPF.acesa{color:#160a2e;background:#bfa4f8}
  .lista{max-height:340px;overflow-y:auto;padding-right:4px}
  .linha{display:flex;align-items:center;gap:10px;padding:8px 6px;border-radius:9px}
  .linha:hover{background:var(--panelAlt)}
  .linha .nome{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}
  .pill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .ajuda{width:22px;height:22px;border-radius:999px;border:1px solid var(--border);
    color:var(--subtext);background:transparent;cursor:default;font-size:11px;position:relative}
  .ajuda:hover .tip{display:block}
  .linha .site{width:22px;height:22px;border-radius:999px;border:1px solid var(--border);
    color:var(--subtext);background:transparent;cursor:pointer;display:flex;align-items:center;
    justify-content:center;flex:none}
  .linha .site:hover{color:var(--accent);border-color:var(--accent)}
  .linha .site svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2}
  .tip{display:none;position:absolute;right:0;top:26px;width:270px;background:#0E1420;
    color:#E7ECF3;border:1px solid var(--border);border-radius:8px;padding:9px 11px;
    font-size:12px;line-height:1.5;z-index:20;box-shadow:0 8px 24px rgba(0,0,0,.4);text-align:left;font-weight:400}
  input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px}
  /* ---------- gaveta de log ---------- */
  .drawer{border-top:1px solid var(--border);background:var(--panelAlt)}
  .drawer .dh{display:flex;align-items:center;justify-content:space-between;
    padding:12px 20px;cursor:pointer;user-select:none;font-size:13px;font-weight:600}
  .drawer .body{height:0;overflow:hidden;transition:height .2s ease;background:#0E1420}
  .drawer.aberta .body{height:300px}
  .log{height:100%;overflow-y:auto;padding:12px 18px;font-family:'JetBrains Mono',monospace;
    font-size:12px;line-height:1.7;color:#c8d2e0;white-space:pre-wrap}
  /* ---------- modais ---------- */
  .overlay{position:fixed;inset:0;background:rgba(20,25,35,.45);display:none;
    align-items:center;justify-content:center;z-index:50}
  .overlay.aberto{display:flex}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;
    width:440px;max-height:82vh;overflow-y:auto;box-shadow:0 20px 50px rgba(20,25,35,.4);padding:22px}
  .modal h3{font-family:'Manrope',sans-serif;font-weight:800;font-size:18px;margin-bottom:14px;
    display:flex;justify-content:space-between;align-items:center}
  .modal .x{cursor:pointer;color:var(--subtext);border:none;background:none;font-size:19px;line-height:1}
  .modal p{color:var(--text);font-size:13.5px;line-height:1.7;white-space:pre-wrap}
  .modal .campo{margin:16px 0}
  .modal label{display:block;font-size:12.5px;color:var(--subtext);margin-bottom:7px}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;padding:10px;border-radius:9px;border:1px solid var(--border);
    background:transparent;color:var(--text);cursor:pointer;font-size:12.5px}
  .seg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .swatches{display:flex;gap:12px}
  .swatch{width:34px;height:34px;border-radius:999px;border:none;cursor:pointer;padding:0}
  .swatch.on{outline:2px solid var(--text);outline-offset:2px}
  /* Configurações com abas laterais */
  .modal.wide{width:min(800px,95vw);max-height:90vh;padding:0;overflow:hidden}
  .cfg{display:flex;height:600px}
  .cfg-side{width:196px;flex:none;background:var(--panelAlt);border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px}
  .cfg-side .tit{font-family:'Manrope',sans-serif;font-weight:800;font-size:16px;padding:2px 8px 12px}
  .cfg-tab{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;color:var(--subtext);font-size:13px;font-weight:600}
  .cfg-tab:hover{background:var(--panel);color:var(--text)}
  .cfg-tab.on{background:var(--accent);color:#fff}
  .cfg-tab svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;flex:none}
  .cfg-main{flex:1;padding:22px 24px;display:flex;flex-direction:column;min-width:0;overflow-y:auto}
  .cfg-main .x{position:absolute;top:16px;right:18px}
  .cfg-pane{display:none;flex:1}
  .cfg-pane.on{display:block}
  .cfg-h{font-family:'Manrope',sans-serif;font-weight:800;font-size:17px;margin:0 0 4px;display:flex;align-items:center}
  .cfg-sub{color:var(--subtext);font-size:13px;margin-bottom:16px;line-height:1.6}
  .cfg-foot{margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
  .wip{font-size:11px;font-weight:700;color:#e0b341;background:rgba(224,179,65,.14);border:1px solid rgba(224,179,65,.4);padding:2px 9px;border-radius:999px;margin-left:10px}
  .apibox{background:var(--panelAlt);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13px;line-height:1.65;color:var(--text)}
  .apibox ol{margin:8px 0 0;padding-left:18px} .apibox li{margin:5px 0}
  .apilink{display:inline-flex;align-items:center;gap:6px;margin-top:12px;color:var(--accent);font-weight:600;font-size:13px;cursor:pointer;text-decoration:none}
  .apilink:hover{text-decoration:underline}
  .apilink svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2}
  .credito{color:#6ee39b;font-weight:700}
  /* editor de perfis */
  .pf-sel{width:100%;background:var(--inputBg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:9px 10px;font-size:13px}
  .pf-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .pf-tab{font-size:12px;font-weight:600;padding:5px 11px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--subtext);cursor:pointer}
  .pf-tab:hover{color:var(--text);border-color:var(--text)}
  .pf-tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .pf-tab.novo{color:var(--accent);border-style:dashed}
  .pf-nome{width:100%;background:var(--inputBg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:9px 10px;font-size:13px;margin-top:10px}
  .pf-docs{margin-top:10px;border:1px solid var(--border);border-radius:9px;max-height:200px;overflow-y:auto}
  .pf-row{display:flex;align-items:center;gap:10px;padding:7px 12px;border-top:1px solid var(--border);font-size:13px}
  .pf-row:first-child{border-top:0}
  .pf-row .pf-nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pf-ck{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--subtext);cursor:pointer}
  .pf-ck.off{opacity:.35;cursor:not-allowed}
  .pf-acoes{display:flex;gap:10px;margin-top:14px}
  .pf-acoes .btn{width:auto;flex:0 0 auto;padding:10px 18px}
  .modal input[type=password]{width:100%;background:var(--inputBg);border:1px solid var(--border);
    border-radius:9px;color:var(--text);padding:10px;font-size:13px}
  /* scrollbar fina */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:rgba(140,150,170,.35);border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(140,150,170,.6)}
</style>
</head>
<body>
<div class="app">
  <div class="rail">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h6"/></svg></div>
    <button class="ativo" title="Painel"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></button>
    <button title="Escanear baixados" onclick="acao('escanear')"><svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg></button>
    <button title="Verificador de validade" onclick="acao('validade')"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg></button>
    <button title="Abrir pasta" onclick="acao('abrir_pasta')"><svg viewBox="0 0 24 24"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8L10 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z"/></svg></button>
    <button title="Juntar PDFs" onclick="acao('juntar')"><svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></button>
    <div class="sep"></div>
    <button title="Ajuda" onclick="abrirAjuda()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".6" fill="currentColor" stroke="none"/></svg></button>
    <button title="Configurações" onclick="abrirConfig()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    <button title="Tema claro/escuro" id="btn-tema" onclick="toggleTema()"></button>
  </div>
  <div class="main">
    <div class="content">
      <h1>Puxador de Certidões</h1>
      <div class="sub">Baixe todas as certidões de um CNPJ ou CPF de uma vez</div>
      <div class="cards">
        <div class="card stat"><div class="ic"><svg viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg></div><div><div class="num" id="s-disp">0</div><div class="lbl">Certidões disponíveis</div></div></div>
        <div class="card stat"><div class="ic"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="num" id="s-sel">0</div><div class="lbl">Selecionadas</div></div></div>
        <div class="card stat"><div class="ic" style="color:#22C55E;background:rgba(34,197,94,.12)"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg></div><div><div class="num" id="s-ok">0</div><div class="lbl">Concluídas</div></div></div>
      </div>
      <div class="grid2">
        <div class="card">
          <h2>Documentos</h2>
          <div class="h-sub">Um CNPJ ou CPF por linha</div>
          <textarea id="docs" placeholder="12.345.678/0001-90&#10;123.456.789-00 01/01/1980 FULANO DE TAL&#10;(CPF: data p/ CND Federal, nome p/ CNJ)"></textarea>
          <button class="btn btn-primary" id="btn-buscar" onclick="buscar()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Buscar e baixar</button>
          <button class="btn btn-outline" id="btn-cancelar" onclick="acao('cancelar')" disabled>Cancelar</button>
        </div>
        <div class="card">
          <div class="cert-head">
            <h2>Certidões</h2>
            <div class="tagfilter">
              <span class="tf-lbl">Marcar:</span>
              <button class="tchip" data-tag="CNPJ" onclick="toggleTag('CNPJ')" title="Pessoa Jurídica — marca/desmarca todas as de CNPJ">CNPJ</button>
              <button class="tchip" data-tag="CPF" onclick="toggleTag('CPF')" title="Pessoa Física — marca/desmarca as que também saem para CPF">CPF</button>
            </div>
          </div>
          <div class="lista" id="lista"></div>
        </div>
      </div>
    </div>
    <div class="drawer" id="drawer">
      <div class="dh" onclick="toggleDrawer()"><span>Registro de atividade</span><span id="dh-ind">▸ mostrar</span></div>
      <div class="body"><div class="log" id="log"></div></div>
    </div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="if(event.target===this)fecharModal()">
  <div class="modal" id="modal"></div>
</div>
<script type="text/javascript" src="/eel.js"></script>
<script>
  let CERTS = [];
  const PILL = {
    pendente:['Pendente','var(--pend)','rgba(140,150,170,.12)'],
    baixando:['Baixando…','var(--baix)','rgba(47,128,237,.12)'],
    ok:['Baixado','var(--ok)','rgba(34,197,94,.12)'],
    ja_valida:['Já válida','#67d8c4','rgba(103,216,196,.12)'],
    erro:['Erro','var(--erro)','rgba(239,68,68,.12)'],
    manual:['Emitir manual','var(--manual)','rgba(200,149,46,.14)'],
    aguardando_captcha:['Resolva o captcha','var(--manual)','rgba(200,149,46,.14)'],
    nao_aplicavel:['—','var(--pend)','rgba(140,150,170,.10)'],
  };
  function pill(st){const p=PILL[st]||PILL.pendente;return `background:${p[2]};color:${p[1]}`}
  function pillTxt(st){return (PILL[st]||PILL.pendente)[0]}

  async function init(){
    const cfg = await eel.carregar_config()();
    if(cfg && cfg.accent) document.documentElement.style.setProperty('--accent', cfg.accent);
    aplicaTema((cfg && cfg.tema) || 'dark');
    CERTS = await eel.listar_certidoes()();
    render();
    const pf = await eel.listar_perfis()();
    PERFIS = (pf && pf.perfis) || {};
    PERFIL_ATIVO = (pf && pf.ativo) || 'Padrão';
    if(PERFIL_ATIVO!=='Padrão' && !PERFIS[PERFIL_ATIVO]) PERFIL_ATIVO='Padrão';
    document.getElementById('s-disp').textContent = CERTS.filter(c=>c.impl).length;
    setInterval(poll, 150);   // consulta a fila de updates do Python
  }
  async function poll(){
    let ups;
    try{ ups = await eel.poll()(); }catch(e){ return; }
    if(!ups || !ups.length) return;
    ups.forEach(u=>{
      if(u.t==='log') addLog(u.m, u.cor);
      else if(u.t==='status') setStatus(u.id, u.st);
      else if(u.t==='fim') finalizar();
    });
  }
  function render(){
    const el=document.getElementById('lista'); el.innerHTML='';
    CERTS.forEach(c=>{
      const row=document.createElement('div'); row.className='linha';
      row.innerHTML = `<input type="checkbox" data-id="${c.id}" onchange="atualizaSel()" ${c.impl?'':'disabled'}>
        <span class="nome" title="${c.label}">${c.label}${c.impl?'':' (em breve)'}</span>
        <span class="tags">${(c.tags||[]).map(t=>`<span class="tag t-${t}" title="${t==='CPF'?'Pessoa Física':'Pessoa Jurídica'}">${t}</span>`).join('')}</span>
        <span class="pill" id="pill-${c.id}" style="${pill('pendente')}">${pillTxt('pendente')}</span>
        ${c.site?`<button class="site" title="Abrir o site desta certidão" onclick="eel.abrir_site('${c.id}')()"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>`:''}
        <button class="ajuda">?<span class="tip">${(c.desc||'').replace(/</g,'&lt;')}</span></button>`;
      el.appendChild(row);
    });
  }
  let TAG_ON = {CNPJ:false, CPF:false};   // estado de cada chip (independente)
  let PERFIS = {}, PERFIL_ATIVO = 'Padrão';
  function checks(){return [...document.querySelectorAll('#lista input[type=checkbox]')]}
  function certDe(x){ return CERTS.find(c=>c.id===x.dataset.id) || {}; }
  // "Padrão": todas as de CNPJ + todas as CPF-capazes (computado, não editável).
  function padraoPerfil(){ return {
    cnpj: CERTS.filter(c=>(c.tags||[]).includes('CNPJ')).map(c=>c.id),
    cpf:  CERTS.filter(c=>(c.tags||[]).includes('CPF')).map(c=>c.id) }; }
  function perfilAtual(){ return PERFIL_ATIVO==='Padrão' ? padraoPerfil() : (PERFIS[PERFIL_ATIVO]||padraoPerfil()); }
  function noPerfil(id, tag){ return (perfilAtual()[tag.toLowerCase()]||[]).includes(id); }

  function toggleTag(tag){ TAG_ON[tag] = !TAG_ON[tag]; aplicaTags(); }
  function aplicaTags(){
    // marcado = coberto por algum chip ATIVO E incluído no PERFIL ativo daquele tipo.
    checks().forEach(x=>{ if(x.disabled) return;
      x.checked = ['CNPJ','CPF'].some(t => TAG_ON[t] && noPerfil(x.dataset.id, t));
    });
    atualizaSel();
  }
  function atualizaSel(){
    // conta por tipo ativo dentro do perfil (Padrão: só CNPJ=13, só CPF=5, ambos=18)
    const total = checks().filter(x=>x.checked).reduce((s,x)=>{
      const ativos = ['CNPJ','CPF'].filter(t => TAG_ON[t] && noPerfil(x.dataset.id, t)).length;
      return s + Math.max(1, ativos);
    }, 0);
    document.getElementById('s-sel').textContent = total;
    ['CNPJ','CPF'].forEach(tag=>{
      const chip=document.querySelector(`.tchip[data-tag="${tag}"]`);
      if(chip) chip.classList.toggle('on', TAG_ON[tag]);
    });
    // tags acendem POR LINHA: só se o chip está ligado e o doc está no perfil ativo.
    document.querySelectorAll('#lista .linha').forEach(row=>{
      const id = row.querySelector('input') && row.querySelector('input').dataset.id;
      ['CNPJ','CPF'].forEach(t=>{
        const el = row.querySelector('.tag.t-'+t);
        if(el) el.classList.toggle('acesa', TAG_ON[t] && noPerfil(id, t));
      });
    });
  }
  function toggleDrawer(){
    const d=document.getElementById('drawer'); d.classList.toggle('aberta');
    document.getElementById('dh-ind').textContent=d.classList.contains('aberta')?'▾ ocultar':'▸ mostrar';
  }
  function buscar(){
    const ids=checks().filter(x=>x.checked).map(x=>x.dataset.id);
    const texto=document.getElementById('docs').value;
    if(!ids.length){addLog('⚠ Selecione ao menos uma certidão.');return}
    if(!document.getElementById('drawer').classList.contains('aberta'))toggleDrawer();
    document.getElementById('btn-buscar').disabled=true;
    document.getElementById('btn-cancelar').disabled=false;
    document.getElementById('s-ok').textContent=0;
    eel.iniciar(texto, ids)();
  }
  function acao(nome){ eel.acao(nome)(); }

  // ---- modais (Ajuda / Configurações) ----
  function esc(s){ return (s||'').replace(/[<>&]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
  function fecharModal(){ document.getElementById('overlay').classList.remove('aberto'); }
  function abrirModal(html, wide){ const m=document.getElementById('modal'); m.classList.toggle('wide', !!wide); m.innerHTML=html; document.getElementById('overlay').classList.add('aberto'); }
  async function abrirAjuda(){
    const t = await eel.texto_ajuda()();
    abrirModal(`<h3>Como funciona o programa<button class="x" onclick="fecharModal()">✕</button></h3>
      <p>${esc(t)}</p>
      <button class="btn btn-primary" style="margin-top:16px" onclick="fecharModal()">Fechar</button>`);
  }
  let _modo='navegador';
  const IC_DOC='<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
  const IC_API='<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="6" rx="1"/><rect x="3" y="14" width="18" height="6" rx="1"/><path d="M7 7h.01M7 17h.01"/></svg>';
  const IC_COR='<svg viewBox="0 0 24 24"><path d="M12 2s6 6.5 6 11a6 6 0 0 1-12 0c0-4.5 6-11 6-11z"/></svg>';
  const IC_PERFIL='<svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>';
  async function abrirConfig(){
    const c = await eel.carregar_config()(); _modo=c.modo;
    abrirModal(`<div class="cfg">
      <div class="cfg-side">
        <div class="tit">Configurações</div>
        <div class="cfg-tab on" data-tab="perfis" onclick="cfgTab('perfis')">${IC_PERFIL} Perfis</div>
        <div class="cfg-tab" data-tab="receita" onclick="cfgTab('receita')">${IC_DOC} Preferência de Download</div>
        <div class="cfg-tab" data-tab="api" onclick="cfgTab('api')">${IC_API} API Infosimples</div>
        <div class="cfg-tab" data-tab="aparencia" onclick="cfgTab('aparencia')">${IC_COR} Aparência</div>
      </div>
      <div class="cfg-main">
        <button class="x" onclick="fecharModal()">✕</button>
        <div class="cfg-pane on" data-pane="perfis" id="pf-pane"></div>
        <div class="cfg-pane" data-pane="receita">
          <div class="cfg-h">Preferência de Download <span class="wip">🚧 Em construção</span></div>
          <div class="cfg-sub">Como o programa baixa a Receita Federal (CND Federal e Cartão CNPJ). Vamos melhorar esta seção em breve.</div>
          <div class="campo"><label>Como emitir a Receita Federal</label>
            <div class="seg">
              <button id="m-nav" class="${c.modo==='navegador'?'on':''}" onclick="setModo('navegador')">Abrir no meu navegador</button>
              <button id="m-api" class="${c.modo==='api'?'on':''}" onclick="setModo('api')">Baixar pela API</button>
            </div></div>
          <div class="cfg-sub"><b>Abrir no navegador</b> (padrão): a Receita bloqueia automação, então o programa abre o site e você resolve o captcha. <b>Baixar pela API</b>: usa a Infosimples (pago) — configure o token na aba <b>API Infosimples</b>.</div>
        </div>
        <div class="cfg-pane" data-pane="api">
          <div class="cfg-h">API Infosimples <span class="wip">🚧 Em construção</span></div>
          <div class="cfg-sub">Baixa a Receita automaticamente, sem você resolver captcha. Opcional e pago.</div>
          <div class="apibox">
            <b>O que faz:</b> serviço pago que consulta e baixa certidões pela internet (útil para a Receita Federal, que normalmente exige emissão manual). Cobra por consulta (cerca de R$ 0,26) — e <span class="credito">dão R$ 100,00 de crédito ao criar a conta</span>.
            <div style="margin-top:8px"><b>Como usar:</b></div>
            <ol>
              <li>Crie uma conta no site <b>infosimples.com</b> (ganha R$ 100 de crédito).</li>
              <li>Gere um <b>token</b> de acesso na sua conta.</li>
              <li>Cole o token abaixo e, na aba <b>Preferência de Download</b>, escolha <b>Baixar pela API</b>.</li>
            </ol>
            <a class="apilink" onclick="eel.abrir_link('https://infosimples.com')()">Saiba mais no site da Infosimples <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>
            <div style="margin-top:10px;color:var(--subtext)">Esta versão gratuita ainda está finalizando o suporte à API — por ora, use "Abrir no navegador".</div>
          </div>
          <div class="campo" style="margin-top:16px"><label>Token da API Infosimples</label>
            <input type="password" id="cfg-token" value="${esc(c.token)}" placeholder="cole seu token aqui"></div>
        </div>
        <div class="cfg-pane" data-pane="aparencia">
          <div class="cfg-h">Aparência</div>
          <div class="cfg-sub">Deixe o programa do jeito que você enxerga melhor.</div>
          <div class="campo"><label>Tema</label>
            <div class="seg">
              <button id="t-claro" class="${_tema==='light'?'on':''}" onclick="setTema('light')">Claro</button>
              <button id="t-escuro" class="${_tema!=='light'?'on':''}" onclick="setTema('dark')">Escuro</button>
            </div></div>
          <div class="campo"><label>Cor de destaque</label>
            <div class="swatches">${ACCENTS.map(cor=>`<button class="swatch ${cor===c.accent?'on':''}" data-cor="${cor}" style="background:${cor}" onclick="setAccent('${cor}')"></button>`).join('')}</div></div>
        </div>
        <div class="cfg-foot"><button class="btn btn-primary" onclick="salvarConfig()">Salvar</button></div>
      </div></div>`, true);
    renderPerfis();
    document.querySelector('.cfg-foot').style.display='none';
  }
  function cfgTab(name){
    document.querySelectorAll('.cfg-tab').forEach(t=>t.classList.toggle('on', t.dataset.tab===name));
    document.querySelectorAll('.cfg-pane').forEach(p=>p.classList.toggle('on', p.dataset.pane===name));
    const foot=document.querySelector('.cfg-foot'); if(foot) foot.style.display=(name==='perfis'?'none':'');
    if(name==='perfis') renderPerfis();
  }
  function setModo(m){ _modo=m;
    document.getElementById('m-nav').classList.toggle('on', m==='navegador');
    document.getElementById('m-api').classList.toggle('on', m==='api'); }
  function setTema(t){ aplicaTema(t); eel.salvar_tema(t)();
    const cl=document.getElementById('t-claro'), es=document.getElementById('t-escuro');
    if(cl) cl.classList.toggle('on', t==='light'); if(es) es.classList.toggle('on', t!=='light'); }
  function salvarConfig(){ eel.salvar_config(_modo, document.getElementById('cfg-token').value)(); fecharModal(); }

  // ---- editor de perfis ----
  let _pfEdit = 'Padrão';   // qual perfil está aberto no editor
  function nomesPerfis(){ return ['Padrão', ...Object.keys(PERFIS)]; }
  function reaplicar(){ if(TAG_ON.CNPJ||TAG_ON.CPF) aplicaTags(); else atualizaSel(); }
  function renderPerfis(){
    const pane=document.getElementById('pf-pane'); if(!pane) return;
    if(!nomesPerfis().includes(_pfEdit) && _pfEdit!=='') _pfEdit='Padrão';
    const nomes=nomesPerfis(), travado=(_pfEdit==='Padrão');
    const p = _pfEdit==='' ? {cnpj:[],cpf:[]} : (_pfEdit==='Padrão'? padraoPerfil() : (PERFIS[_pfEdit]||{cnpj:[],cpf:[]}));
    pane.innerHTML = `
      <div class="cfg-h">Perfis de download</div>
      <div class="cfg-sub">Um perfil define quais certidões os chips CNPJ e CPF marcam na lista.</div>
      <div class="campo"><label>Perfil ativo</label>
        <select class="pf-sel" onchange="ativarPerfil(this.value)">
          ${nomes.map(n=>`<option ${n===PERFIL_ATIVO?'selected':''}>${esc(n)}</option>`).join('')}
        </select></div>
      <div class="campo"><label>Editar / criar</label>
        <div class="pf-tabs">
          ${nomes.map(n=>`<button class="pf-tab ${n===_pfEdit?'on':''}" onclick="editarPerfil('${esc(n)}')">${esc(n)}</button>`).join('')}
          <button class="pf-tab novo ${_pfEdit===''?'on':''}" onclick="editarPerfil('')">+ Novo</button>
        </div>
        <input class="pf-nome" id="pf-nome" placeholder="Nome do perfil" value="${esc(_pfEdit==='Padrão'?'':_pfEdit)}" ${travado?'disabled':''}>
        <div class="pf-docs">
          ${CERTS.map(c=>{
            const cnpj=(p.cnpj||[]).includes(c.id), cpf=(p.cpf||[]).includes(c.id), cpfOk=(c.tags||[]).includes('CPF');
            return `<div class="pf-row"><span class="pf-nm">${esc(c.label)}</span>
              <label class="pf-ck"><input type="checkbox" data-id="${c.id}" data-t="cnpj" ${cnpj?'checked':''} ${travado?'disabled':''}>CNPJ</label>
              <label class="pf-ck ${cpfOk?'':'off'}"><input type="checkbox" data-id="${c.id}" data-t="cpf" ${cpf?'checked':''} ${(!cpfOk||travado)?'disabled':''}>CPF</label>
            </div>`;
          }).join('')}
        </div>
        ${travado
          ? `<div class="cfg-sub" style="margin-top:12px">O <b>Padrão</b> é fixo (todas as 13 de CNPJ + as 5 de CPF) e não pode ser editado. Clique em <b>+ Novo</b> para criar o seu.</div>`
          : `<div class="pf-acoes"><button class="btn btn-primary" onclick="salvarPerfil()">Salvar perfil</button>${_pfEdit!=='' ? `<button class="btn btn-outline" onclick="excluirPerfil('${esc(_pfEdit)}')">Excluir</button>`:''}</div>`}
      </div>`;
  }
  function ativarPerfil(nome){ PERFIL_ATIVO=nome; eel.definir_perfil_ativo(nome)(); reaplicar(); }
  function editarPerfil(nome){ _pfEdit=nome; renderPerfis(); }
  function salvarPerfil(){
    const nome=(document.getElementById('pf-nome').value||'').trim();
    if(!nome){ alert('Dê um nome ao perfil.'); return; }
    if(nome==='Padrão'){ alert('"Padrão" é reservado — escolha outro nome.'); return; }
    const cnpj=[], cpf=[];
    document.querySelectorAll('.pf-docs input:checked').forEach(ck=>{ (ck.dataset.t==='cpf'?cpf:cnpj).push(ck.dataset.id); });
    eel.salvar_perfil(nome, cnpj, cpf)();
    PERFIS[nome]={cnpj,cpf}; PERFIL_ATIVO=nome; _pfEdit=nome;
    renderPerfis(); reaplicar();
  }
  function excluirPerfil(nome){
    if(nome==='Padrão'||nome==='') return;
    eel.remover_perfil(nome)();
    delete PERFIS[nome];
    if(PERFIL_ATIVO===nome) PERFIL_ATIVO='Padrão';
    _pfEdit='Padrão'; renderPerfis(); reaplicar();
  }
  const ACCENTS=['#3B82F6','#8B5CF6','#16A34A','#C8952E','#E8763C','#E5484D'];
  function setAccent(cor){
    document.documentElement.style.setProperty('--accent', cor);
    eel.salvar_accent(cor)();
    document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('on', s.dataset.cor===cor));
  }
  const IC_SOL='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  const IC_LUA='<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
  let _tema='dark';
  function aplicaTema(t){
    _tema=t;
    if(t==='light') document.documentElement.setAttribute('data-theme','light');
    else document.documentElement.removeAttribute('data-theme');
    document.getElementById('btn-tema').innerHTML = (t==='light'? IC_LUA : IC_SOL);
  }
  function toggleTema(){ const t=(_tema==='light'?'dark':'light'); aplicaTema(t); eel.salvar_tema(t)(); }

  // ---- chamadas Python -> JS ----
  const CORLOG={vermelho:'#ff6b6b',amarelo:'#e0b341',verde:'#6ee39b'};
  function addLog(msg, cor){
    const l=document.getElementById('log');
    const div=document.createElement('div');
    div.textContent=msg;
    if(cor&&CORLOG[cor]){ div.style.color=CORLOG[cor]; div.style.fontWeight='600'; }
    l.appendChild(div);
    while(l.childElementCount>250) l.removeChild(l.firstChild);
    l.scrollTop=l.scrollHeight;
  }
  function setStatus(id,st){
    const p=document.getElementById('pill-'+id); if(!p)return;
    p.style.cssText=pill(st); p.textContent=pillTxt(st);
    if(st==='ok'||st==='ja_valida'){
      const n=document.getElementById('s-ok'); n.textContent=(parseInt(n.textContent)||0)+1;
    }
  }
  function finalizar(){
    document.getElementById('btn-buscar').disabled=false;
    document.getElementById('btn-cancelar').disabled=true;
  }
  window.addEventListener('load', init);
</script>
</body>
</html>
